description = "Bootstrap Kobiton credentials and CLI wrapper for the automate plugin"

prompt = '''
You are bootstrapping the Kobiton automate plugin for a Gemini CLI user.

## Step 0 (already done): Install CLI wrapper symlink

The bundled installer just ran:

!{bash $HOME/.gemini/extensions/kobiton-automate/scripts/install-cli.sh 2>&1 && echo "INSTALL_OK" || echo "INSTALL_FAIL"}

Parse the output above:
- "INSTALL_OK": symlink in place at `~/.kobiton/bin/kobiton`, continue to Step 1.
- "INSTALL_FAIL" or other error: the installer couldn't locate a binary for this platform (only macOS arm64 and Linux x64 ship a binary). Surface the error to the user, then continue anyway — credentials still need to be written so the MCP tools work; only `run-interactive-cli-session` is affected.

## Step 1: Fetch credentials via the `kobiton` MCP server

Call the MCP tool `getCredential` with `userIntent: "Bootstrap ~/.kobiton/.credentials for the automate plugin"`. It returns `{username, apiKey, portal}`.

On auth error (401, "Unauthorized"): tell the user to run `/mcp auth kobiton` to complete the OAuth flow, then retry `/automate:setup`. Stop.

## Step 2: Confirm with the user before writing

Show this masked summary (display the API key as first 8 characters followed by `***`; if it's shorter than 8 characters, show only `***`):

```
Ready to write to ~/.kobiton/.credentials:

[default]
KOBITON_USER=<username>
KOBITON_API_KEY=<first-8-chars>***
KOBITON_PORTAL=<portal>
```

Ask: "Proceed? This will overwrite the [default] profile if it exists." If they decline, stop with "Setup aborted. Nothing was written."

**NEVER echo the unmasked API key in chat.**

## Step 3: Write the file atomically

Use your bash tool. The script preserves any other profiles already in the file; the new `[default]` block replaces an existing `[default]` at the same position, or is appended at the end if none exists. File mode is set to 0600.

```bash
KB_USER='<username>' KB_KEY='<apiKey>' KB_PORTAL='<portal>' python3 <<'PY'
import os, re
path = os.path.expanduser("~/.kobiton/.credentials")
os.makedirs(os.path.dirname(path), exist_ok=True)
block = f"[default]\nKOBITON_USER={os.environ['KB_USER']}\nKOBITON_API_KEY={os.environ['KB_KEY']}\nKOBITON_PORTAL={os.environ['KB_PORTAL']}"
if os.path.exists(path):
    with open(path) as f: text = f.read()
    parts = re.split(r"(?m)^\s*\[\s*([^\]]+?)\s*\]\s*$", text)
    head, blocks, replaced = parts[0].strip(), [], False
    if head: blocks.append(head)
    for i in range(1, len(parts), 2):
        n, body = parts[i].strip(), parts[i+1].strip()
        if n == "default":
            blocks.append(block); replaced = True
        else:
            blocks.append(f"[{n}]\n{body}")
    if not replaced: blocks.append(block)
else:
    blocks = [block]
old = os.umask(0o077)
try:
    fd = os.open(path + ".tmp", os.O_WRONLY | os.O_CREAT | os.O_TRUNC, 0o600)
    with os.fdopen(fd, "w") as f: f.write("\n\n".join(blocks) + "\n")
    os.replace(path + ".tmp", path); os.chmod(path, 0o600)
finally:
    os.umask(old)
print("WROTE default")
PY
```

Substitute `<username>`, `<apiKey>`, `<portal>` with the actual values from Step 1 before running. Pass them via env vars (`KB_*` to avoid clashing with the standard `$USER`).

## Step 4: Confirm to the user

After the write succeeds, tell the user: `Profile [default] written to ~/.kobiton/.credentials. Run /automate:doctor to verify.`

If Step 0 reported `INSTALL_FAIL`, also append: `Note: the ~/.kobiton/bin/kobiton CLI symlink could not be installed (likely an unsupported platform). MCP tools and run-automation-suite still work; only run-interactive-cli-session requires the symlink.`

## Note on advanced cases

This Gemini skeleton always writes to the `[default]` profile. For multi-profile support (e.g., separate `[test]` / `[prod]` for different Kobiton environments), edit `~/.kobiton/.credentials` directly after setup, or use Claude Code's `/automate:setup` which negotiates profile names and handles conflicts interactively.
'''
