domain: AUTOMATION
tools:
  - name: startNativeSession
    title: Start Native Session
    description: >
      Start a Kobiton native automation session. The server manages test
      execution end-to-end. Use getSession to poll for status.
    annotations:
      readOnlyHint: false
      destructiveHint: false
    inputSchema:
      type: object
      properties:
        userIntent:
          type: string
          description: >-
            A brief summary of what the user is trying to accomplish with this
            tool call, refined from their original prompt. Used for audit
            logging.
        sessionName:
          type: string
          description: Session name (5-80 chars)
        sessionDescription:
          type: string
          description: Session description (max 500 chars)
        testFramework:
          type: string
          enum:
            - UIAUTOMATOR
            - XCUITEST
            - APPIUM
            - GAMEDRIVER
          description: Test framework to use
        deviceName:
          type: string
          description: Device identifier
        udid:
          type: string
          description: Device UDID
        platformVersion:
          type: string
          description: Device OS version
        deviceGroup:
          type: string
          description: Device group (e.g., ORGANIZATION)
        groupId:
          type: integer
          description: Team/Group ID
        app:
          type: string
          description: App reference (e.g., "kobiton-store:v123")
        testRunner:
          type: string
          description: S3 path from uploadAppForRunner
        noReset:
          type: boolean
          default: false
        fullReset:
          type: boolean
          default: false
        sessionTimeout:
          type: integer
          description: Session timeout in milliseconds
        testTimeout:
          type: integer
          description: Test timeout in milliseconds
        deviceTags:
          type: array
          description: Tag groups, e.g., [["healthy"], ["project", "dev"]]
          items:
            type: array
            items:
              type: string
        deviceWaitTimeout:
          type: integer
          description: Device availability timeout
        runCommand:
          type: string
          description: Command string for test execution
        args:
          type: array
          description: Additional command-line arguments for test execution
          items:
            type: string
        env:
          type: object
          description: Environment variables
      required:
        - userIntent
        - testFramework
  - name: startAppiumSession
    title: Start Appium Session
    description: >
      Start an Appium WebDriver session on Kobiton. Supports both
      desiredCapabilities (legacy) and W3C capabilities format ({alwaysMatch,
      firstMatch}). Set useAppium to true to inject kobiton:runtime "appium"
      into capabilities; without it the default Kobiton runtime is used.
      Kobiton vendor extensions use the kobiton: prefix.
    annotations:
      readOnlyHint: false
      destructiveHint: false
    inputSchema:
      type: object
      properties:
        userIntent:
          type: string
          description: >-
            A brief summary of what the user is trying to accomplish with this
            tool call, refined from their original prompt. Used for audit
            logging.
        desiredCapabilities:
          type: object
          description: >
            Legacy Appium desired capabilities. Common fields: sessionName,
            deviceName, platformName, platformVersion, udid, browserName,
            deviceGroup, app, automationName, noReset, fullReset. Kobiton
            extensions: kobiton:visualValidation, kobiton:flexCorrect,
            kobiton:scriptlessEnable, etc.
        capabilities:
          type: object
          description: W3C capabilities format.
          properties:
            alwaysMatch:
              type: object
              description: Capabilities that must be matched
            firstMatch:
              type: array
              description: Array of capability sets, first match wins
              items:
                type: object
        useAppium:
          type: boolean
          description: >
            Set to true to inject kobiton:runtime "appium" into capabilities.
            Required for non-native Appium tests.
          default: false
        scriptPath:
          type: string
          description: >
            Optional path to a local Appium test script (.js). If provided, the
            agent injects hub URL and capabilities into the script and executes
            it. Credentials are NOT injected. If omitted, returns connection
            info for manual test execution.
      required:
        - userIntent
