tools:
  - name: listDevices
    title: List Devices
    description: >
      List available devices filtered by platform, availability status,
      or device group. Returns device name, UDID, platform, OS version,
      and availability.
    annotations:
      readOnlyHint: true
      destructiveHint: false
    inputSchema:
      type: object
      properties:
        platform:
          type: string
          enum: [android, ios]
          description: Filter by device platform
        available:
          type: boolean
          description: Only show currently available devices
        groupId:
          type: integer
          description: Filter by device group ID
        limit:
          type: integer
          description: Maximum number of devices to return
          default: 50

  - name: getDeviceStatus
    title: Get Device Status
    description: >
      Get the real-time status of a specific device including availability,
      current session info, battery level, and connection state.
    annotations:
      readOnlyHint: true
      destructiveHint: false
    inputSchema:
      type: object
      properties:
        deviceId:
          type: integer
          description: The device ID
      required:
        - deviceId

  - name: reserveDevice
    title: Reserve Device
    description: >
      Reserve a device for exclusive use during testing. The reservation
      prevents other users from starting sessions on the device.
      Use the device UDID from listDevices. Returns reservation_id
      which is needed for terminateReservation.
    annotations:
      readOnlyHint: false
      destructiveHint: false
    inputSchema:
      type: object
      properties:
        udid:
          type: string
          description: The device UDID to reserve (from listDevices)
        durationMinutes:
          type: integer
          description: Reservation duration in minutes
          default: 30
      required:
        - udid

  - name: terminateReservation
    title: Terminate Reservation
    description: >
      Release a reserved device by terminating its reservation.
      Use the reservation_id returned by reserveDevice or from
      listDevices (reservation_id field on reserved devices).
    annotations:
      readOnlyHint: false
      destructiveHint: true
    inputSchema:
      type: object
      properties:
        reservationId:
          type: integer
          description: Reservation ID from reserveDevice or listDevices
      required:
        - reservationId
