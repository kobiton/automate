domain: APP
tools:
  - name: listApps
    title: List Apps
    description: >
      List uploaded app builds for the current user's organization. Returns app
      ID, name, version, platform, upload date, and status.
    annotations:
      readOnlyHint: true
      destructiveHint: false
    inputSchema:
      type: object
      properties:
        userIntent:
          type: string
          description: >-
            A brief summary of what the user is trying to accomplish with this
            tool call, refined from their original prompt. Used for audit
            logging.
        keyword:
          type: string
          description: Search by app name, tag, or ID
        platform:
          type: string
          enum:
            - ANDROID
            - IOS
          description: Filter by app platform
        limit:
          type: integer
          description: Maximum number of apps to return (max 20)
          default: 5
      required:
        - userIntent
  - name: uploadAppToStore
    title: Upload App to Store
    description: >
      Upload an app build to Kobiton Store for permanent storage and management.
      The app appears in the portal's app repository. Three-step process:
      1) Call this tool to get a pre-signed upload URL, upload_headers, and app_path
      2) Upload the file via PUT to upload_url using the exact upload_headers returned
      3) Confirm the upload by POSTing to the Kobiton API with app_path and filename
      The upload_headers must be sent exactly as returned or S3 will reject the upload.
      The confirm step (step 3) triggers Kobiton to parse the file and create the app
      record. Without it, the file is orphaned in S3. See the confirm_instructions
      in the response for the exact POST request to make.
    annotations:
      readOnlyHint: false
      destructiveHint: false
    inputSchema:
      type: object
      properties:
        userIntent:
          type: string
          description: >-
            A brief summary of what the user is trying to accomplish with this
            tool call, refined from their original prompt. Used for audit
            logging.
        filename:
          type: string
          description: App filename with extension (e.g., "my-app.apk")
        platform:
          type: string
          enum:
            - ANDROID
            - IOS
          description: App platform
      required:
        - userIntent
        - filename
        - platform
  - name: uploadAppForRunner
    title: Upload App for Runner
    description: >
      Upload an app to S3 for test runner consumption. Not visible in the
      portal app repository. Two-step process:
      1) Call this tool to get a pre-signed upload URL, upload_headers, and test_runner_id
      2) Upload the file via PUT to that URL using the exact upload_headers returned
      Use the returned path or test_runner_id when starting sessions.
    annotations:
      readOnlyHint: false
      destructiveHint: false
    inputSchema:
      type: object
      properties:
        userIntent:
          type: string
          description: >-
            A brief summary of what the user is trying to accomplish with this
            tool call, refined from their original prompt. Used for audit
            logging.
        filename:
          type: string
          description: App filename with extension (.apk, .ipa, .zip)
        testRunnerId:
          type: string
          description: Optional UUID v4. Auto-generated if not provided.
      required:
        - userIntent
        - filename
  - name: getApp
    title: Get App
    description: >
      Get detailed information about an app including name, platform, state, and
      optionally all version history.
    annotations:
      readOnlyHint: true
      destructiveHint: false
    inputSchema:
      type: object
      properties:
        userIntent:
          type: string
          description: >-
            A brief summary of what the user is trying to accomplish with this
            tool call, refined from their original prompt. Used for audit
            logging.
        appId:
          type: integer
          description: App ID
        includeAllVersions:
          type: boolean
          description: Include all app versions
          default: false
      required:
        - userIntent
        - appId
