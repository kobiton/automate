domain: USER
tools:
  - name: getCredential
    title: Get Credential
    description: >
      Return the current OAuth-authenticated user's username, an API key
      (existing or newly generated with alias "claude-code"), and the
      canonical portal URL of the API environment. Used by the
      /automate:setup command to bootstrap ~/.kobiton/.credentials.
      Aside from userIntent, the tool accepts no input — it operates on
      the authenticated user from the OAuth context.
    annotations:
      readOnlyHint: false
      destructiveHint: false
    inputSchema:
      type: object
      properties:
        userIntent:
          type: string
          description: >-
            A brief summary of what the user is trying to accomplish with this
            tool call, refined from their original prompt. Used for audit
            logging.
      required:
        - userIntent
