domain: DEVICE
tools:
  - name: listDeviceBundles
    title: List Device Bundles
    description: >
      List device bundles for matrix testing. A bundle is a predefined group of
      devices used for running test suites across multiple device/OS
      combinations.
    annotations:
      readOnlyHint: true
      destructiveHint: false
    inputSchema:
      type: object
      properties:
        userIntent:
          type: string
          description: >-
            A brief summary of what the user is trying to accomplish with this
            tool call, refined from their original prompt. Used for audit
            logging.
        platformName:
          type: string
          enum:
            - ANDROID
            - IOS
          description: Filter by platform
        category:
          type: string
          description: Bundle category filter
      required:
        - userIntent
